name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build and Test Daml Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install DPM (Daml Package Manager)
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Verify DPM installation
        run: dpm --version

      - name: Build Daml project
        # This command assumes daml.yaml is in the project root
        # and its 'source' key points to the 'daml' directory.
        run: dpm build

      - name: Run Daml tests
        run: dpm test