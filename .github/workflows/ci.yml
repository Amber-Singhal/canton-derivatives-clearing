name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------
      # Daml Build & Test
      # -------------------------------------------
      - name: Install DPM
        run: curl https://get.digitalasset.com/install/install.sh | sh

      - name: Add DPM to PATH
        run: echo "$HOME/.dpm/bin" >> $GITHUB_PATH

      - name: Build Daml code
        # Assumes a multi-package.yaml at the root, or a single daml.yaml
        run: dpm build

      - name: Run Daml tests
        run: dpm test

      # -------------------------------------------
      # Frontend Build & Test
      # -------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      # Add linting if a lint script exists in package.json
      # - name: Lint frontend
      #   working-directory: ./frontend
      #   run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      # Add tests if a test script exists in package.json
      # - name: Run frontend tests
      #   working-directory: ./frontend
      #   run: npm test